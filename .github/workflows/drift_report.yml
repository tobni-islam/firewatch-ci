name: Weekly Drift Report

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:         # Manual trigger button in GitHub Actions UI

jobs:
  generate-drift-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install evidently pandas numpy

      - name: Generate drift report
        run: python src/monitoring/drift_report.py

      - name: Commit report to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add reports/
          git diff --staged --quiet || \
            git commit -m "data(fw-monitor): weekly drift report $(date +%Y-%m-%d) [skip ci]"
          git push
