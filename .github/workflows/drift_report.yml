name: Drift Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  report:
    name: Generate Drift Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate placeholder drift report
        run: |
          mkdir -p reports
          echo "Drift report generated at $(date -u)" > reports/drift_report.txt
          cat reports/drift_report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/
