name: Model Evaluation and Promotion

on:
  push:
    branches: [master]
    paths:
      - "models/weights.dvc"
      - "metrics/train_results.json"

env:
  MLFLOW_TRACKING_URI:      ${{ secrets.DAGSHUB_MLFLOW_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

jobs:
  evaluate-and-promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dvc ultralytics mlflow pyyaml numpy

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull trained model from DVC remote
        run: dvc pull models/weights/

      - name: Pull val data from DVC
        run: dvc pull data/processed/val

      - name: pull test data from DVC
        run: dvc pull data/processed/test

      - name: Evaluate model on test set
        run: >-
          python src/evaluate.py
          --config params.yaml
          --weights models/weights/train/weights/best.pt

      - name: Compare vs MLflow baseline
        run: python src/compare_models.py
        # Exits 1 if new model does not improve, this marks the job as FAILED.
        # That is intentional: a regression should be visible in Actions history.

      - name: Register and promote to Production
        run: python src/register_model.py

      - name: Run batch inference (Evidently logs)
        run: >-
          python src/batch_inference.py
          --config params.yaml
          --weights models/weights/train/weights/best.pt

      - name: Commit evaluation results back to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add metrics/eval_results.json logs/inference_log.csv
          git diff --staged --quiet ||             git commit -m "data(fw-ci): update eval metrics and inference logs [skip ci]"
          git push
