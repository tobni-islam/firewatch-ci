data:
  raw_dir: data/raw
  processed_dir: data/processed
  sample_dir: data/sample
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

model:
  architecture: yolov8s
  num_classes: 2
  class_names: [fire, smoke]
  img_size: 640

train:
  epochs: 100
  batch_size: 16
  lr0: 0.01
  weight_decay: 0.0005
  seed: 42
  mosaic: 1.0      # 4-image mosaic
  hsv_h: 0.03      # broader hue range
  hsv_s: 0.8       # saturation variation
  hsv_v: 0.5       # brightness variation
  fliplr: 0.5      # horizontal flip
  degrees: 5.0     # slight rotation
  scale: 0.5       # scale jitter
  translate: 0.1
  cls: 1.5

smoke_train:
  epochs: 5
  batch_size: 8

evaluate:
  conf_threshold: 0.25
  iou_threshold: 0.45
  smoke_map_threshold: 0.65
  fire_map_threshold: 0.80
  batch: 1
