data:
  raw_dir: data/raw
  processed_dir: data/processed
  sample_dir: data/sample
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

model:
  architecture: yolov8s
  num_classes: 2
  class_names: [fire, smoke]
  img_size: 640

train:
  epochs: 100
  batch_size: 16
  lr0: 0.01
  weight_decay: 0.0005
  seed: 42

smoke_train:
  epochs: 5
  batch_size: 8

evaluate:
  conf_threshold: 0.25
  iou_threshold: 0.45
  smoke_map_threshold: 0.65
