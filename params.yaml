data:
  raw_dir: data/raw
  processed_dir: data/processed
  sample_dir: data/sample
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

model:
  architecture: yolov8s
  num_classes: 2
  class_names: [fire, smoke]
  img_size: 640

train:
  epochs: 25
  lr0: 0.003
  mosaic: 0.5
  hsv_h: 0.015
  hsv_s: 0.6
  hsv_v: 0.4
  degrees: 2.0
  scale: 0.3
  translate: 0.05
  cls: 1.0

smoke_train:
  epochs: 4
  batch_size: 8

evaluate:
  conf_threshold: 0.25
  iou_threshold: 0.45
  smoke_map_threshold: 0.65
  fire_map_threshold: 0.80
